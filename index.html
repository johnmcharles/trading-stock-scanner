<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Chatter Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 24px 16px;
    }

    .container { max-width: 900px; margin: 0 auto; }

    .header {
      background: linear-gradient(135deg, #1e3a5f, #0f172a);
      border: 1px solid #1e40af;
      border-radius: 14px;
      padding: 28px 32px;
      margin-bottom: 24px;
    }

    .header-label {
      font-size: 11px;
      color: #60a5fa;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 800;
      color: #f1f5f9;
    }

    .header .date {
      font-size: 13px;
      color: #64748b;
      margin-top: 6px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 20px 24px;
    }

    .card-label {
      font-size: 11px;
      font-weight: 700;
      color: #60a5fa;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .pick-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #1e293b;
    }

    .pick-item:last-child { border-bottom: none; }

    .pick-ticker {
      font-size: 18px;
      font-weight: 800;
      color: #f1f5f9;
    }

    .pick-rank {
      font-size: 11px;
      color: #475569;
      margin-top: 2px;
    }

    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 6px;
    }

    .badge-earnings {
      background: #f59e0b22;
      color: #f59e0b;
      border: 1px solid #f59e0b44;
    }

    .ticker-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-radius: 8px;
      margin-bottom: 6px;
      background: #0f172a;
    }

    .ticker-name {
      font-weight: 700;
      font-size: 14px;
      color: #f1f5f9;
      min-width: 60px;
    }

    .ticker-bar-wrap {
      flex: 1;
      margin: 0 12px;
      background: #1e293b;
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
    }

    .ticker-bar {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
    }

    .ticker-count {
      font-size: 12px;
      color: #64748b;
      min-width: 50px;
      text-align: right;
    }

    .sentiment-bull { color: #22c55e; font-weight: 600; }
    .sentiment-bear { color: #ef4444; font-weight: 600; }
    .sentiment-neutral { color: #64748b; }

    .report-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px 28px;
      margin-bottom: 24px;
    }

    .report-text {
      font-size: 14px;
      line-height: 1.8;
      color: #cbd5e1;
      white-space: pre-wrap;
    }

    .history-table {
      width: 100%;
      border-collapse: collapse;
    }

    .history-table th {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid #334155;
    }

    .history-table td {
      padding: 10px 12px;
      font-size: 13px;
      color: #94a3b8;
      border-bottom: 1px solid #1e293b;
    }

    .history-table td:first-child { color: #f1f5f9; font-weight: 600; }

    .loading {
      text-align: center;
      color: #475569;
      padding: 40px;
      font-size: 14px;
    }

    .footer {
      text-align: center;
      font-size: 11px;
      color: #334155;
      padding: 16px;
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-label">Live Dashboard</div>
    <h1>📊 Stock Chatter Scanner</h1>
    <div class="date" id="last-updated">Loading...</div>
  </div>

  <div class="grid">
    <!-- Top 3 Picks -->
    <div class="card">
      <div class="card-label">Today's Top 3 Picks</div>
      <div id="top-picks"><div class="loading">Loading...</div></div>
    </div>

    <!-- Sentiment Summary -->
    <div class="card">
      <div class="card-label">Mention Volume</div>
      <div id="mention-bars"><div class="loading">Loading...</div></div>
    </div>
  </div>

  <!-- AI Report -->
  <div class="report-card">
    <div class="card-label">AI Analysis</div>
    <div class="report-text" id="report-text">Loading report...</div>
  </div>

  <!-- History Table -->
  <div class="card">
    <div class="card-label">Pick History</div>
    <div id="history-table"><div class="loading">Loading history...</div></div>
  </div>

  <div class="footer">Auto-refreshes daily · For informational purposes only · Not financial advice</div>
</div>

<script>
  const SHEET_ID = document.currentScript ? '' : '';

  // ── Fetch data from Google Sheets published CSV ───────────────────────────
  // Dashboard tab
  const DASHBOARD_URL = `https://docs.google.com/spreadsheets/d/${getSheetId()}/gviz/tq?tqx=out:json&sheet=Dashboard`;
  const LOG_URL       = `https://docs.google.com/spreadsheets/d/${getSheetId()}/gviz/tq?tqx=out:json&sheet=Daily+Log`;

  function getSheetId() {
    // Sheet ID is embedded at build time via the scanner script
    return window.SHEET_ID || '';
  }

  async function fetchSheetData(url) {
    try {
      const r = await fetch(url);
      const text = await r.text();
      const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);/)[1]);
      return json.table.rows;
    } catch(e) {
      console.error('Sheet fetch error:', e);
      return [];
    }
  }

  function cellVal(row, i) {
    return row.c[i] && row.c[i].v !== null ? row.c[i].v : '';
  }

  async function loadDashboard() {
    const rows = await fetchSheetData(DASHBOARD_URL);
    if (!rows || rows.length < 2) {
      document.getElementById('report-text').textContent = 'No data yet. Run the scanner first.';
      return;
    }

    // Row 0 = last_updated, Row 1 = report, Row 2+ = tickers
    const lastUpdated = cellVal(rows[0], 1);
    const report      = cellVal(rows[1], 1);
    const tickerRows  = rows.slice(2).filter(r => r.c && r.c[0] && r.c[0].v);

    document.getElementById('last-updated').textContent = `Last updated: ${lastUpdated}`;
    document.getElementById('report-text').textContent  = report;

    // Top 3 picks
    const picks = tickerRows.slice(0, 3);
    const labels = ['🥇', '🥈', '🥉'];
    document.getElementById('top-picks').innerHTML = picks.map((row, i) => {
      const ticker   = cellVal(row, 0);
      const sentiment = parseInt(cellVal(row, 2)) || 0;
      const earnings = cellVal(row, 3) === 'True';
      const sentClass = sentiment > 0 ? 'sentiment-bull' : sentiment < 0 ? 'sentiment-bear' : 'sentiment-neutral';
      const sentLabel = sentiment > 0 ? '▲ Bullish' : sentiment < 0 ? '▼ Bearish' : '— Neutral';
      return `
        <div class="pick-item">
          <div>
            <div class="pick-ticker">${labels[i]} ${ticker}</div>
            <div class="pick-rank ${sentClass}">${sentLabel}</div>
          </div>
          ${earnings ? '<span class="badge badge-earnings">EARNINGS</span>' : ''}
        </div>`;
    }).join('');

    // Mention bars
    const maxCount = Math.max(...tickerRows.map(r => parseInt(cellVal(r, 1)) || 0));
    document.getElementById('mention-bars').innerHTML = tickerRows.map(row => {
      const ticker = cellVal(row, 0);
      const count  = parseInt(cellVal(row, 1)) || 0;
      const pct    = maxCount > 0 ? (count / maxCount * 100) : 0;
      return `
        <div class="ticker-row">
          <span class="ticker-name">${ticker}</span>
          <div class="ticker-bar-wrap"><div class="ticker-bar" style="width:${pct}%"></div></div>
          <span class="ticker-count">${count}</span>
        </div>`;
    }).join('');
  }

  async function loadHistory() {
    const rows = await fetchSheetData(LOG_URL);
    if (!rows || rows.length < 2) return;

    const dataRows = rows.slice(1).reverse().slice(0, 14); // last 14 days
    document.getElementById('history-table').innerHTML = `
      <table class="history-table">
        <thead><tr>
          <th>Date</th><th>Pick 1</th><th>Pick 2</th><th>Pick 3</th><th>Top Tickers</th>
        </tr></thead>
        <tbody>${dataRows.map(row => `
          <tr>
            <td>${cellVal(row,0)}</td>
            <td>${cellVal(row,1)}</td>
            <td>${cellVal(row,2)}</td>
            <td>${cellVal(row,3)}</td>
            <td style="font-size:11px;color:#475569;">${(cellVal(row,4)||'').split(',').slice(0,5).join(', ')}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  }

  loadDashboard();
  loadHistory();
</script>
</body>
</html>
